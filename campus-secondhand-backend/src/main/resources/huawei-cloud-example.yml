huawei-cloud:
  rds:
    enabled: true
    host: your-rds-instanceEndpoint
    port: 3306
    database: campus_secondhand
    username: your-rds-username
    password: your-rds-password
    charset: utf8mb4
    timezone: Asia/Shanghai
    use-ssl: false
    pool:
      max-active: 20
      max-idle: 10
      min-idle: 5
      max-wait: 30000

  obs:
    enabled: true
    access-key: your-huawei-obs-access-key
    secret-key: your-huawei-obs-secret-key
    endpoint: https://obs.cn-north-4.myhuaweicloud.com
    region: cn-north-4
    bucket: your-bucket-name
    upload:
      max-size: 10485760
      allowed-types: jpg,jpeg,png,gif,webp
      path-prefix: products/